# Koku nginx site config. Install at /etc/nginx/sites-available/koku
# and link into sites-enabled. SSL via Let's Encrypt (certbot --nginx).

server {
    listen 80;
    server_name koku.ikigaistudio.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name koku.ikigaistudio.ai;

    ssl_certificate     /etc/letsencrypt/live/koku.ikigaistudio.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koku.ikigaistudio.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # PWA / service worker must be served at the app origin.
    location = /sw-push.js {
        proxy_pass http://127.0.0.1:3001;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        proxy_pass http://127.0.0.1:3001;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 1m;
}
